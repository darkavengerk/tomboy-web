<!doctype html>
<html lang="ko">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
		<meta name="theme-color" content="#f57900" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
		<link rel="icon" href="/icons/icon-192.png" type="image/png" sizes="192x192" />
		<!-- iOS strictly requires PNG for apple-touch-icon. Using SVG here
			 makes iOS Safari treat the home-screen entry as a Safari
			 bookmark instead of a real PWA, which prevents push
			 subscriptions from persisting across launches. -->
		<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
