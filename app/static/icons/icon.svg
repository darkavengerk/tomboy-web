<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#f57900"/>
  <g transform="translate(128, 80)">
    <!-- Note paper -->
    <rect x="0" y="0" width="256" height="352" rx="16" fill="white" opacity="0.95"/>
    <!-- Lines on paper -->
    <line x1="40" y1="80" x2="216" y2="80" stroke="#ddd" stroke-width="4"/>
    <line x1="40" y1="120" x2="200" y2="120" stroke="#ddd" stroke-width="4"/>
    <line x1="40" y1="160" x2="180" y2="160" stroke="#ddd" stroke-width="4"/>
    <line x1="40" y1="200" x2="210" y2="200" stroke="#ddd" stroke-width="4"/>
    <line x1="40" y1="240" x2="160" y2="240" stroke="#ddd" stroke-width="4"/>
    <!-- Pencil -->
    <g transform="translate(170, 220) rotate(45)">
      <rect x="-8" y="-80" width="16" height="100" rx="2" fill="#f5c211"/>
      <polygon points="-8,20 8,20 0,36" fill="#333"/>
      <rect x="-8" y="-80" width="16" height="12" rx="2" fill="#e06800"/>
    </g>
  </g>
</svg>
