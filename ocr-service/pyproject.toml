[project]
name = "ocr-service"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "pillow>=10.4",
    "python-multipart>=0.0.9",
]

[project.optional-dependencies]
model = [
    "torch>=2.3,<3",
    "torchvision>=0.18",
    "transformers>=4.45,<4.50",
    "accelerate>=0.33",
    "verovio>=4.3",
    # GOT-OCR2 의 tokenizer가 trust_remote_code 로 동적 import 함.
    # transformers 가 자동으로 안 끌어와서 [model] extras 에 명시.
    "tiktoken>=0.7",
]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
